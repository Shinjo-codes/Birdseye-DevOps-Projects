<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">

  <!-- User -->
  <rect x="300" y="20" width="200" height="60" fill="#E3F2FD" stroke="#1E88E5"></rect>
  <text x="400" y="55" font-size="14" text-anchor="middle">🌍 End Users</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="80" x2="400" y2="140" stroke="black" marker-end="url(#arrow)"></line>
  <text x="420" y="110" font-size="12">HTTPS</text>

  <!-- Front Door -->
  <rect x="200" y="140" width="400" height="120" fill="#E8F5E9" stroke="#43A047"></rect>
  <text x="400" y="170" font-size="14" text-anchor="middle">Azure Front Door</text>
  <text x="400" y="195" font-size="12" text-anchor="middle">CDN • WAF • Routing • SSL</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="260" x2="400" y2="320" stroke="black" marker-end="url(#arrow)"></line>
  <text x="420" y="300" font-size="12">Optimized Request</text>

  <!-- Storage -->
  <rect x="200" y="320" width="400" height="120" fill="#FFF3E0" stroke="#FB8C00"></rect>
  <text x="400" y="350" font-size="14" text-anchor="middle">Azure Storage</text>
  <text x="400" y="375" font-size="12" text-anchor="middle">$web container</text>
  <text x="400" y="400" font-size="12" text-anchor="middle">index.html • assets</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="black"></path>
    </marker>
  </defs>

</svg>